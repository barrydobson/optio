apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Installs Envoy Gateway and the Gateway API CRDs.
# Apply this first and wait for the controller to be ready before applying ../routing.
#
#   kubectl apply -k k8s/local/infra
#   kubectl wait --timeout=90s --for=condition=Available \
#     deployment/envoy-gateway -n envoy-gateway-system
resources:
  - https://github.com/envoyproxy/gateway/releases/download/v1.2.0/install.yaml
