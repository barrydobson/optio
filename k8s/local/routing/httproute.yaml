apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: optio
  namespace: optio
spec:
  parentRefs:
    - name: optio-gateway
  hostnames:
    - optio.test
  rules:
    # /api and /ws both go to the API service
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /ws
      backendRefs:
        - name: optio-api
          port: 4000
    # Everything else goes to the web frontend
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: optio-web
          port: 3000
